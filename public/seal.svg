<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CUVETSMO Source — Verified medical knowledge seal">
  <!-- Cream document background — same paper-50 as the site -->
  <rect width="512" height="512" rx="80" fill="#fbfaf7"/>

  <!-- Corner registration marks (subtle L-brackets, like a printer's proof) -->
  <g fill="#0a635a" opacity="0.18">
    <rect x="36"  y="36"  width="36" height="3"/>
    <rect x="36"  y="36"  width="3"  height="36"/>
    <rect x="440" y="36"  width="36" height="3"/>
    <rect x="473" y="36"  width="3"  height="36"/>
    <rect x="36"  y="473" width="36" height="3"/>
    <rect x="36"  y="440" width="3"  height="36"/>
    <rect x="440" y="473" width="36" height="3"/>
    <rect x="473" y="440" width="3"  height="36"/>
  </g>

  <defs>
    <line id="srcTick" x1="0" y1="-212" x2="0" y2="-196"
          stroke="#0a635a" stroke-width="2.6" stroke-linecap="round"/>
  </defs>

  <!-- ── Central seal ── -->
  <g transform="translate(256 256)">
    <!-- Outer ring + double-stroke inner ring (engraved seal feel) -->
    <circle r="204" fill="none" stroke="#0a635a" stroke-width="3.5"/>
    <circle r="184" fill="none" stroke="#0a635a" stroke-width="1.5"/>

    <!-- 24 tick marks around the perimeter — one per 15° (calendar-like) -->
    <g>
      <use href="#srcTick"/>
      <use href="#srcTick" transform="rotate(15)"/>
      <use href="#srcTick" transform="rotate(30)"/>
      <use href="#srcTick" transform="rotate(45)"/>
      <use href="#srcTick" transform="rotate(60)"/>
      <use href="#srcTick" transform="rotate(75)"/>
      <use href="#srcTick" transform="rotate(90)"/>
      <use href="#srcTick" transform="rotate(105)"/>
      <use href="#srcTick" transform="rotate(120)"/>
      <use href="#srcTick" transform="rotate(135)"/>
      <use href="#srcTick" transform="rotate(150)"/>
      <use href="#srcTick" transform="rotate(165)"/>
      <use href="#srcTick" transform="rotate(180)"/>
      <use href="#srcTick" transform="rotate(195)"/>
      <use href="#srcTick" transform="rotate(210)"/>
      <use href="#srcTick" transform="rotate(225)"/>
      <use href="#srcTick" transform="rotate(240)"/>
      <use href="#srcTick" transform="rotate(255)"/>
      <use href="#srcTick" transform="rotate(270)"/>
      <use href="#srcTick" transform="rotate(285)"/>
      <use href="#srcTick" transform="rotate(300)"/>
      <use href="#srcTick" transform="rotate(315)"/>
      <use href="#srcTick" transform="rotate(330)"/>
      <use href="#srcTick" transform="rotate(345)"/>
    </g>

    <!-- 12 o'clock anchor — the verified-north marker -->
    <circle cx="0" cy="-220" r="6" fill="#0a635a"/>

    <!-- Inner hairline frame around the S -->
    <circle r="138" fill="none" stroke="#0a635a" stroke-width="1" stroke-opacity="0.35"/>

    <!-- The S — serif, hand-set, deep teal -->
    <text x="0" y="74"
          font-family="Newsreader, 'Source Serif Pro', Georgia, 'Times New Roman', serif"
          font-size="278" font-weight="700"
          fill="#0a635a" text-anchor="middle">S</text>

    <!-- Year stamp below — Roman numerals like an old colophon -->
    <text x="0" y="150"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="15" font-weight="600"
          letter-spacing="5" fill="#0a635a" fill-opacity="0.55"
          text-anchor="middle">MMXXVI</text>
  </g>

  <!-- Bottom band — micro wordmark for large-display contexts -->
  <text x="256" y="488"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="700"
        letter-spacing="4" fill="#0a635a" fill-opacity="0.55"
        text-anchor="middle">SOURCE · CUVETSMO</text>
</svg>
