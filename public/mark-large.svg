<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="source.cuvetsmo.com — verified medical knowledge mark">
  <!-- Hero-size variant of the new mark.
       Designed for OG cards, presentations, and large display contexts.
       Identical construction to /icon.svg but with subtle inner light + larger accent. -->

  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a635a"/>
      <stop offset="55%"  stop-color="#085950"/>
      <stop offset="100%" stop-color="#053634"/>
    </linearGradient>
    <radialGradient id="topLight" cx="0.5" cy="0" r="0.8">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Body -->
  <rect width="512" height="512" rx="112" fill="url(#bg2)"/>

  <!-- Top light wash for soft depth -->
  <rect width="512" height="256" rx="112" fill="url(#topLight)"/>

  <!-- Refined inner stroke -->
  <rect x="4" y="4" width="504" height="504" rx="108"
        fill="none" stroke="rgba(251,250,247,0.08)" stroke-width="1"/>

  <!-- Bold modern S — large size, slightly negative tracking -->
  <text x="256" y="370"
        font-family="'Inter Tight', 'Inter', 'SF Pro Display', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="320" font-weight="900"
        fill="#fbfaf7" text-anchor="middle"
        letter-spacing="-14">S</text>

  <!-- Verification accent — two-layer dot for depth -->
  <circle cx="402" cy="110" r="26" fill="url(#accent)"/>
  <circle cx="402" cy="110" r="13" fill="#FED7AA" opacity="0.9"/>

  <!-- Bottom edge wordmark micro — "SOURCE · CUVETSMO" letter-spaced caps -->
  <text x="256" y="478"
        font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif"
        font-size="18" font-weight="700"
        letter-spacing="8"
        fill="rgba(251,250,247,0.55)" text-anchor="middle">SOURCE · CUVETSMO</text>
</svg>
