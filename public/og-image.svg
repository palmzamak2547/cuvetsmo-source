<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CUVETSMO Source — Verified Thai medical knowledge">
  <!-- 1200×630 — standard Open Graph / Twitter card aspect ratio.
       Layout: cream stationery with the editorial seal on the left,
       wordmark + tagline + colophon to its right. -->

  <!-- Background — warm cream paper -->
  <rect width="1200" height="630" fill="#fbfaf7"/>

  <!-- Subtle border framing (like an academic broadside) -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#0a635a" stroke-width="2" stroke-opacity="0.4"/>
  <rect x="56" y="56" width="1088" height="518" fill="none" stroke="#0a635a" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Corner registration marks -->
  <g fill="#0a635a" opacity="0.35">
    <rect x="78"  y="78"  width="32" height="2.5"/>
    <rect x="78"  y="78"  width="2.5" height="32"/>
    <rect x="1090" y="78" width="32" height="2.5"/>
    <rect x="1119.5" y="78" width="2.5" height="32"/>
    <rect x="78"  y="549.5" width="32" height="2.5"/>
    <rect x="78"  y="520" width="2.5" height="32"/>
    <rect x="1090" y="549.5" width="32" height="2.5"/>
    <rect x="1119.5" y="520" width="2.5" height="32"/>
  </g>

  <!-- ── Left side: large editorial seal ── -->
  <g transform="translate(260 315)">
    <!-- outer ring -->
    <circle r="190" fill="none" stroke="#0a635a" stroke-width="3.5"/>
    <!-- inner double-stroke -->
    <circle r="172" fill="none" stroke="#0a635a" stroke-width="1.4"/>
    <!-- 24 ticks -->
    <g stroke="#0a635a" stroke-width="2.4" stroke-linecap="round">
      <line x1="0" y1="-198" x2="0" y2="-184"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(15)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(30)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(45)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(60)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(75)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(90)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(105)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(120)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(135)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(150)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(165)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(180)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(195)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(210)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(225)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(240)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(255)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(270)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(285)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(300)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(315)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(330)"/>
      <line x1="0" y1="-198" x2="0" y2="-184" transform="rotate(345)"/>
    </g>
    <!-- 12 o'clock anchor -->
    <circle cx="0" cy="-208" r="5.5" fill="#0a635a"/>
    <!-- hairline frame around the S -->
    <circle r="128" fill="none" stroke="#0a635a" stroke-width="0.8" stroke-opacity="0.35"/>
    <!-- The S -->
    <text x="0" y="64"
          font-family="Newsreader, 'Source Serif Pro', Georgia, 'Times New Roman', serif"
          font-size="260" font-weight="700"
          fill="#0a635a" text-anchor="middle">S</text>
    <!-- Year stamp -->
    <text x="0" y="135"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="14" font-weight="600"
          letter-spacing="5" fill="#0a635a" fill-opacity="0.55"
          text-anchor="middle">MMXXVI</text>
  </g>

  <!-- ── Right side: wordmark + tagline + colophon ── -->
  <g>
    <!-- Eyebrow -->
    <text x="510" y="180"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
          font-size="20" font-weight="700"
          letter-spacing="8" fill="#0a635a">CUVETSMO · SOURCE</text>

    <!-- Display headline (Newsreader serif, big) -->
    <text x="510" y="250"
          font-family="Newsreader, 'Source Serif Pro', Georgia, 'Times New Roman', serif"
          font-size="58" font-weight="700" letter-spacing="-1"
          fill="#053634">Verified Thai medical</text>
    <text x="510" y="312"
          font-family="Newsreader, 'Source Serif Pro', Georgia, 'Times New Roman', serif"
          font-size="58" font-weight="700" letter-spacing="-1"
          fill="#053634">knowledge.</text>

    <!-- Thin rule -->
    <line x1="510" y1="350" x2="1080" y2="350" stroke="#0a635a" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Subhead -->
    <text x="510" y="400"
          font-family="Newsreader, 'Source Serif Pro', Georgia, serif"
          font-size="24" font-weight="400" font-style="italic"
          fill="#3d362d">Every claim, citation, and signature</text>
    <text x="510" y="432"
          font-family="Newsreader, 'Source Serif Pro', Georgia, serif"
          font-size="24" font-weight="400" font-style="italic"
          fill="#3d362d">verifies in your browser.</text>

    <!-- Colophon — bottom stats line -->
    <line x1="510" y1="490" x2="1080" y2="490" stroke="#0a635a" stroke-width="0.6" stroke-opacity="0.4"/>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace"
       font-size="14" letter-spacing="3" fill="#3d362d" fill-opacity="0.85">
      <text x="510" y="520">39 ENTRIES · 11 CLASSES · 120 CITATIONS</text>
      <text x="510" y="544">ED25519 · WHO ATC · RXNORM · ICD-11 · LOINC</text>
      <text x="510" y="568" fill="#0a635a" fill-opacity="0.9">SOURCE.CUVETSMO.COM</text>
    </g>
  </g>
</svg>
