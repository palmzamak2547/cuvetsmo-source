<svg viewBox="0 0 760 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="source.cuvetsmo.com wordmark">
  <!-- Horizontal lockup: square mark + bold sans wordmark + tagline.
       Used in landing hero, presentation slides, email signature, footer. -->

  <defs>
    <linearGradient id="wmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a635a"/>
      <stop offset="100%" stop-color="#053634"/>
    </linearGradient>
    <linearGradient id="wmAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Mark on the left (smaller copy of /icon.svg) -->
  <g transform="translate(0 8)">
    <rect width="128" height="128" rx="28" fill="url(#wmBg)"/>
    <text x="64" y="96"
          font-family="'Inter Tight', 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif"
          font-size="88" font-weight="900"
          fill="#fbfaf7" text-anchor="middle"
          letter-spacing="-4">S</text>
    <circle cx="100" cy="28" r="6.5" fill="url(#wmAccent)"/>
    <circle cx="100" cy="28" r="3.2" fill="#FED7AA"/>
  </g>

  <!-- Wordmark — "source" in bold geometric sans -->
  <text x="160" y="78"
        font-family="'Inter Tight', 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif"
        font-size="68" font-weight="900"
        fill="#053634"
        letter-spacing="-3">source</text>

  <!-- Hairline divider rule -->
  <line x1="160" y1="98" x2="640" y2="98" stroke="#0a635a" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Tagline — small caps -->
  <text x="160" y="118"
        font-family="'Inter', system-ui, sans-serif"
        font-size="12" font-weight="700"
        letter-spacing="5"
        fill="#0a635a">VERIFIED THAI VETERINARY KNOWLEDGE</text>
  <text x="160" y="140"
        font-family="'Inter', system-ui, sans-serif"
        font-size="11" font-weight="500"
        letter-spacing="3"
        fill="#3d362d">a project of CUVETSMO · 2026</text>
</svg>
